<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      button {
        border-radius: 8px;
        background-color: rgb(0, 98, 255);
        height: 50px;
        width: 200px;
        color: aliceblue;
        font-size: larger;
        font-weight: bolder;
        cursor: pointer;
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <center>
      Username <input id="username" type="text" /> <br /><br />
      Password <input id="password" type="text" /> <br /><br /><br />
      <button onclick="signUp()">Sign Up</button>
      <button onclick="signIn()">Sign In</button>
    </center>

    <script>
            function signUp(){
                   var username = document.getElementById("username").value
                   var password = document.getElementById("password").value
                   var jsonData = {
                    "user" : username,
                    "pass" : password
                   }
                   fetch("/signUp",
                    {
                     "method": 'POST',
                     "headers":
                     {
                        "Content-Type":"application/json",
                     },
                      "body": JSON.stringify(jsonData)
                    })
            }
            function signIn(){
                   var username = document.getElementById("username").value
                   var password = document.getElementById("password").value
                   var jsonData = {
                    "user" : username,
                    "pass" : password
                   }
                   fetch("/signIn",
                    {
                     "method": 'POST',
                     "headers":
                     {
                        "Content-Type":"application/json",
                     },
                      "body": JSON.stringify(jsonData)
                    })
            }
    </script>
  </body>
</html>
