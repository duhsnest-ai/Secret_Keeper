<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      button {
        border-radius: 8px;
        background-color: rgb(0, 98, 255);
        height: 50px;
        width: 200px;
        color: aliceblue;
        font-size: larger;
        font-weight: bolder;
        cursor: pointer;
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <center>
      Username <input id="username" type="text" /> <br /><br />
      Password <input id="password" type="text" /> <br /><br /><br />
      <button onclick="signUp()">Sign Up</button>
      <button onclick="signIn()">Sign In</button>

      <br><br>
      <input type="checkbox" id="rememberDevice"> Keep me signed in
    </center>

    <script>
            async function signUp(){
                   var username = document.getElementById("username").value
                   var password = document.getElementById("password").value
                   var jsonData = {
                    "user" : username,
                    "pass" : password
                   }
                   var response = await fetch("/signUp",
                    {
                     "method": 'POST',
                     "headers":
                     {
                        "Content-Type":"application/json",
                     },
                      "body": JSON.stringify(jsonData)
                    })
                    var responseText = await response.text()
                    alert(responseText)

            }
            async function signIn(){
                   var checkBox = document.getElementById("rememberDevice").checked
                   //we store the value of the username and the password inside the cookies or the local storage
                   var username = document.getElementById("username").value
                   var password = document.getElementById("password").value
                   var jsonData = {
                    "user" : username,
                    "pass" : password
                   }
                   var response = await fetch("/signIn",
                    {
                     "method": 'POST',
                     "headers":
                     {
                        "Content-Type":"application/json",
                     },
                      "body": JSON.stringify(jsonData)
                    })
                    var finalResult = await response.text()
                    if(finalResult == "Successful login"){
                      localStorage.setItem("username", username)
                      // window.location.href = "/secretDetails"
                      var response = await fetch("/secretDetails",
                        {
                          headers : {
                            authorization : username + " " + password
                          }
                        }
                      )
                      var statusCode = await response.status                    
                      
                    }
                    else{
                      alert(finalResult)
                    }
            }
    </script>
  </body>
</html>
