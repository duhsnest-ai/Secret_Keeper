<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button {
        border-radius: 8px;
        background-color: rgb(0, 98, 255);
        height: 50px;
        width: 200px;
        color: aliceblue;
        font-size: larger;
        font-weight: bolder;
        cursor: pointer;
        margin: 20px;
      } 
    </style>
</head>
<body>
    <center>
        <!-- If you have already kept a secret with us click on the button below to see the boxes get filled.
        <br> -->
        <!-- <button onclick="retrieveAnswer()">View Past Answers</button> -->
        <!-- <br><br><br> -->
        <!-- What is your username? <br> <input id="username" type="text">
        <br><br> -->
        What is your age? <br> <input id="age" type="number">
        <br><br>
        What is your secret that you want to keep with us? <br> <textarea rows="10" cols="50" id="secret"></textarea>
        <br><br>
        <button onclick="submitAnswer()">Submit</button>
    </center>

    <script>
        async function submitAnswer(){
            var username = localStorage.getItem("username")
            var age = document.getElementById("age").value
            var secret = document.getElementById("secret").value
            var jsonData = 
            {
                "username" : username,
                "age" : age,
                "secret" : secret
            }
            var response = await fetch("/submit",
                {
                     "method": 'POST',
                     "headers":
                     {
                        "Content-Type":"application/json",
                     },
                      "body": JSON.stringify(jsonData)
                }
            )

            var textResponse = await response.text()
            alert(textRespoonse)
        }

        async function retrieveAnswer(){
            var username = localStorage.getItem("username")
            var response = await fetch("/secret?username="+username)
            var jsonResponse = await response.json()
            var secret = jsonResponse.secret
            var age = jsonResponse.age
            document.getElementById("age").value = age
            document.getElementById("secret").value = secret
            // console.log(jsonResponse)
        }

        retrieveAnswer()
    </script>
</body>
</html>
